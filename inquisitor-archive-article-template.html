<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Article Title -->
    <title>Article Template</title>
    <link rel="stylesheet" href="indexstyle.css">
    <link rel="stylesheet" href="styles/article.css">
</head>
<body>
    <header>
    <nav>
        <h1>The Sharn Inquisitor Archive</h1>
        <div class = buttondiv>
            <button>|||</button>
            <div class="menu">
                <a href="index.html">Home</a>
                <a href="about.html">About Us</a>
                <a href="recent.html">Most Recent Article</a>
            </div>
        </div>
    </nav>
    </header>
    <main>
    <!-- Adjacent Articles -->
    <a href="#"><p id="leftarrow"><</p></a>
    <a href="#"><p id="rightarrow">></p></a>
    <!-- Heading -->
    <h2>Lorem Ipsum Dolor!</h2>
    <!-- Author Information-->
    <div id="author-info">
    <img class="author-small" src="#" alt="Author Name">
    <p>By _</p>
    <p id="date">**-**-**</p>
    </div>
    <!-- Clipping -->
    <button type="button" class="collapsible"><p>Newspaper Clipping</p><p id="button_arrow">V</p></button>
    <div class="content"><img class="newspaper-clipping" src="#" alt="Newspaper Clipping"></div>
    <!-- Article Text -->
    <p>
        Lorem ipsum,
        <br><br>
        Lorem ipsum dolor.
    </p>
    <!-- Image -->
    <img class="article-photo" src="#" alt="Description of Photo">
    </main>
    <script>
        var coll = document.getElementsByClassName("collapsible");
        var i;
            
        for (i = 0; i < coll.length; i++) {
          coll[i].addEventListener("click", function() {
            this.classList.toggle("active");
            var content = this.nextElementSibling;
            if (content.style.display === "block") {
              content.style.display = "none";
            } else {
              content.style.display = "block";
            }
          });
        } 
    </script>
    <footer>
    <h2>The Sharn Inquisitor Archive</h2>
    <div id="footernav">
        <a href="index.html">Home</a>
        <a href="about.html">About Us</a>
        <a href="recent.html"> Most recent article</a>
    </div>
    </footer>
</body>
</html>
